<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura — Your AI Companion</title>
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
</head>
<body>
<div class="app" id="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <div class="logo-name">Aura</div>
        <div class="logo-tagline">AI Companion</div>
      </div>
    </div>

    <!-- Profile -->
    <div class="profile-card">
      <label>Your name</label>
      <input type="text" id="username-input" placeholder="Enter your name…" maxlength="30" />
      <div class="greeting" id="greeting-text"></div>
    </div>

    <!-- Quick replies -->
    <div>
      <div class="section-title">Quick prompts</div>
      <div class="quick-replies" id="quick-replies">
        <button class="qr-btn" data-msg="What is artificial intelligence?">💡 What is AI?</button>
        <button class="qr-btn" data-msg="Help me write clean Python code for a simple task.">🐍 Help me code</button>
        <button class="qr-btn" data-msg="Tell me something fascinating I probably don't know.">🌍 Surprise me</button>
        <button class="qr-btn" data-msg="How can I be more productive today?">⚡ Productivity tips</button>
        <button class="qr-btn" data-msg="Explain machine learning in simple terms.">🤖 Explain ML</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="sidebar-actions">
      <button class="action-btn danger" id="clear-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear conversation
      </button>
    </div>
  </aside>

  <!-- ══ CHAT AREA ══ -->
  <main class="chat-area">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="bot-avatar">✦</div>
        <div class="bot-info">
          <div class="bot-name">Aura</div>
          <div class="bot-status"><span class="status-dot"></span> Online</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="theme-toggle" title="Toggle theme">
          <svg id="theme-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="icon-btn" id="clear-btn-top" title="Clear chat">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Welcome screen shown when empty -->
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">✦</div>
        <h2>Hello, I'm Aura</h2>
        <p>Your friendly AI companion. Ask me anything — from coding help to life questions.</p>
      </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="input-wrap">
        <textarea
          class="msg-input"
          id="msg-input"
          placeholder="Ask Aura anything…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <div class="input-actions">
          <button class="voice-btn" id="voice-btn" title="Voice input">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 1a3 3 0 0 1 3 3v8a3 3 0 0 1-6 0V4a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <button class="send-btn" id="send-btn" disabled title="Send message">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">Press <kbd style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;">Enter</kbd> to send · <kbd style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10px;">Shift+Enter</kbd> for new line</div>
    </div>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
